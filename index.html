<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DailyVet — Documentos Legais</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F7F7F5;
      color: #040316;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      max-width: 520px;
      width: 100%;
      background: white;
      border-radius: 20px;
      padding: 48px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      text-align: center;
    }
    .logo {
      display: inline-block;
      padding: 12px 20px;
      background: #2C813F;
      color: white;
      border-radius: 12px;
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p.subtitle {
      color: #6B7280;
      font-size: 16px;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .link {
      display: block;
      padding: 18px 24px;
      background: #F0F9F1;
      color: #2C813F;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: background 0.2s;
    }
    .link:hover {
      background: #E0F2E5;
    }
    footer {
      margin-top: 32px;
      font-size: 13px;
      color: #9CA3AF;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">DailyVet</div>
    <h1>Documentos Legais</h1>
    <p class="subtitle">Conheça nossos termos e como tratamos seus dados.</p>
    <div class="links">
      <a href="./terms.html" class="link">Termos de Uso</a>
      <a href="./privacy.html" class="link">Política de Privacidade</a>
    </div>
    <footer>
      Última atualização: Abril de 2026<br>
      Contato: dailyvetapp@gmail.com
    </footer>
  </div>
</body>
</html>
