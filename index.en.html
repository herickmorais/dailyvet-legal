<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DailyVet — Legal Documents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F7F7F5;
      color: #040316;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }
    .lang-switch {
      position: absolute;
      top: 20px;
      right: 24px;
      display: flex;
      gap: 4px;
      background: white;
      padding: 4px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .lang-switch a {
      padding: 6px 12px;
      border-radius: 7px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      color: #6B7280;
      transition: all 0.2s;
    }
    .lang-switch a.active {
      background: #2C813F;
      color: white;
    }
    .lang-switch a:not(.active):hover {
      background: #F0F9F1;
      color: #2C813F;
    }
    .container {
      max-width: 520px;
      width: 100%;
      background: white;
      border-radius: 20px;
      padding: 48px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      text-align: center;
    }
    .logo {
      display: inline-block;
      padding: 12px 20px;
      background: #2C813F;
      color: white;
      border-radius: 12px;
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p.subtitle {
      color: #6B7280;
      font-size: 16px;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .link {
      display: block;
      padding: 18px 24px;
      background: #F0F9F1;
      color: #2C813F;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: background 0.2s;
    }
    .link:hover {
      background: #E0F2E5;
    }
    footer {
      margin-top: 32px;
      font-size: 13px;
      color: #9CA3AF;
    }
  </style>
</head>
<body>
  <div class="lang-switch">
    <a href="./index.html">PT</a>
    <a href="./index.en.html" class="active">EN</a>
  </div>

  <div class="container">
    <div class="logo">DailyVet</div>
    <h1>Legal Documents</h1>
    <p class="subtitle">Read our terms and how we handle your data.</p>
    <div class="links">
      <a href="./terms.en.html" class="link">Terms of Use</a>
      <a href="./privacy.en.html" class="link">Privacy Policy</a>
    </div>
    <footer>
      Last updated: April 2026<br>
      Contact: dailyvetapp@gmail.com
    </footer>
  </div>
</body>
</html>
